name: queue_up

services:
  submission-sanitizer-java:
    build: ../../submission-sanitizer-java
    container_name: submission-sanitizer-java
    restart: unless-stopped
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/v1/submissions/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: queue_up
      POSTGRES_USER: queue_up
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue_up -d queue_up"]
      interval: 5s
      timeout: 5s
      retries: 20

  go-backend:
    build: ../../backend
    container_name: go-backend
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://queue_up:${POSTGRES_PASSWORD}@postgres:5432/queue_up?sslmode=disable"
      SUBMISSION_SANITIZER_WEBHOOK_URL: "http://submission-sanitizer-java:8090/v1/submissions/sanitize"
      SUBMISSION_SANITIZER_WEBHOOK_TIMEOUT_MS: "3000"
      LEETCODE_API_BASE_URL: "https://leetcode-api-pied.vercel.app"
      LEETCODE_API_TIMEOUT_MS: "4000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      submission-sanitizer-java:
        condition: service_healthy
    command: >
      sh -c "
      ./api-server"
    working_dir: /app
    env_file:
      - ../../.env
    volumes:
      - ../../.env:/app/.env

volumes:
  postgres_data: {}
